name: Publish to GitHub Packages

on:
  # Primary release flow: create a GitHub Release with a tag matching
  # `v<package.json version>` (e.g. `v0.3.0-itall.0`). Pushing the tag
  # triggers this workflow which publishes both packages. Release notes
  # are authored on the GitHub Release page.
  push:
    tags:
      - "v*"
  # Manual trigger reserved for ad-hoc publish or re-runs. dry-run is
  # ignored on tag pushes.
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Run publish in dry-run mode (no actual publish)"
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      # `contents: write` is required for the moving major-tag step at
      # the bottom (force-push `v<major>` to the released commit so
      # consumers can pin `uses: ...@v0` and pick up patch releases
      # without editing their workflow).
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: "@it-all-service"

      # Sanity check: when triggered by a tag, the tag name must match
      # the CLI package version. Fails fast on mismatches so we never
      # publish a tag whose meaning drifted from package.json.
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./packages/react-doctor/package.json').version")
          echo "tag=$TAG_VERSION pkg=$PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match packages/react-doctor version $PKG_VERSION"
            exit 1
          fi

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      # Publish the sidecar ESLint plugin first so the CLI's optional
      # peer dep resolves cleanly when consumers install both packages.
      - name: Publish @it-all-service/eslint-plugin-itall-react
        working-directory: packages/eslint-plugin-itall-react
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry-run }}" = "true" ]; then
            pnpm publish --no-git-checks --dry-run
          else
            pnpm publish --no-git-checks
          fi

      - name: Publish @it-all-service/react-doctor
        working-directory: packages/react-doctor
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry-run }}" = "true" ]; then
            pnpm publish --no-git-checks --dry-run
          else
            pnpm publish --no-git-checks
          fi

      # Move the major-version tag (`v0`, `v1`, …) to the released
      # commit so consumers can pin our composite action with
      # `uses: IT-ALL-Service/itall-react-doctor@v0` and pick up
      # patch / minor releases without editing their workflow.
      # Skipped on `workflow_dispatch` (re-publish from an older
      # commit shouldn't claim the major tag) and on dry-run.
      - name: Update major moving tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MAJOR="v${TAG_VERSION%%.*}"
          # Pre-release tags like `v0.5.0-rc.1` would have MAJOR end with
          # the suffix — strip anything after the first non-digit so we
          # never write `v0-rc` etc.
          MAJOR="$(echo "$MAJOR" | sed -E 's/^v([0-9]+).*/v\1/')"
          if [ -z "$MAJOR" ]; then
            echo "::warning::Could not derive major tag from $GITHUB_REF_NAME"
            exit 0
          fi
          echo "Updating moving tag $MAJOR → $GITHUB_SHA"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$MAJOR" "$GITHUB_SHA"
          git push origin "$MAJOR" --force

      # GitHub Release 자동 생성. `gh release create --generate-notes` 가
      # 직전 release 태그부터 이번 태그까지의 커밋을 모아 noisy하지 않은
      # release notes를 만들어준다. pre-release (예: `-rc.1`) 는 prerelease
      # 마크. 이미 release가 있으면 `gh release edit` 으로 노트만 갱신.
      # Skipped on workflow_dispatch and dry-run.
      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="$GITHUB_REF_NAME"
          PRERELEASE_FLAG=""
          case "$TAG" in
            *-*) PRERELEASE_FLAG="--prerelease" ;;
          esac
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — refreshing notes."
            gh release edit "$TAG" --draft=false $PRERELEASE_FLAG
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              $PRERELEASE_FLAG
          fi
